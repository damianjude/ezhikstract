name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install Linting Tools
        run: pip install ruff mypy

      - name: Run Ruff (Linting & Formatting Check)
        run: |
          ruff check .
          ruff format --check .

      - name: Run Mypy (Type Checking)
        run: mypy src/ezhikstract --ignore-missing-imports

  test-and-build:
    name: Test & Build (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout Code with Tags (for hatch-vcs)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies & Package
        run: |
          python -m pip install --upgrade pip
          pip install build ".[dev]"

      - name: Run Tests
        run: |
          if [ -d "tests" ]; then
            pytest --cov=ezhikstract
          fi
        shell: bash

      - name: Verify Package Build (Wheel & sdist)
        run: python -m build
