name: Release & Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build Distribution Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for hatch-vcs versioning

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Build Tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload Artifacts for Release Jobs
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  attach-to-github-release:
    name: Attach Packages to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Upload dist files to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    # Required permissions for PyPI Trusted Publishing (OIDC)
    permissions:
      id-token: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
