name: Release & Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  verify-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status for commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          echo "Checking CI status for commit: $SHA"
          
          # Poll for up to 10 minutes (20 iterations * 30 seconds)
          for i in {1..20}; do
            RUNS=$(gh run list --repo "${{ github.repository }}" --commit "$SHA" --workflow "CI" --json conclusion,status,databaseId)

            
            if [ "$RUNS" = "[]" ] || [ -z "$RUNS" ]; then
              echo "No CI runs found for this commit yet. Waiting 30s..."
              sleep 30
              continue
            fi
            
            STATUS=$(echo "$RUNS" | jq -r '.[0].status')
            CONCLUSION=$(echo "$RUNS" | jq -r '.[0].conclusion')
            
            echo "CI run status: $STATUS, conclusion: $CONCLUSION"
            
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "CI completed successfully!"
                exit 0
              else
                echo "CI completed but failed: $CONCLUSION"
                exit 1
              fi
            fi
            
            echo "CI is still in progress ($STATUS). Waiting 30 seconds..."
            sleep 30
          done
          
          echo "Timed out waiting for CI workflow to complete."
          exit 1

  build:
    name: Build Distribution Artifacts
    needs: verify-ci
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for hatch-vcs versioning

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Build Tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload Artifacts for Release Jobs
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  attach-to-github-release:
    name: Attach Packages to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Upload dist files to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    # Required permissions for PyPI Trusted Publishing (OIDC)
    permissions:
      id-token: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
